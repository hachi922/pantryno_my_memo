<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAum5GxFtfiSBmmLqQRWusCJxZKzvmW0ow",
  authDomain: "panyryno.firebaseapp.com",
  projectId: "panyryno",
  storageBucket: "panyryno.firebasestorage.app",
  messagingSenderId: "678099181033",
  appId: "1:678099181033:web:0b84a8dd7dea39ee603f78"
};
firebase.initializeApp(firebaseConfig);
const _db = firebase.firestore();
const _auth = firebase.auth();

function _loadFromFirestore(user){
  window._fbUid = user.uid;
  const ref = _db.collection('users').doc(user.uid).collection('data').doc('main');
  ref.get().then(snap=>{
    if(snap.exists){
      const d=snap.data();
      if(d.invCats)S.invCats=d.invCats;
      if(d.recCats)S.recCats=d.recCats;
      if(d.inventory)S.inventory=d.inventory;
      if(d.recipes){
        S.recipes=d.recipes;
        S.recipes.forEach(r=>{
          if(r.ings&&!r.ingGroups){r.ingGroups=[{label:'',ings:r.ings}];delete r.ings;}
          r.stepGroups=normalizeStepGroups(r.stepGroups||r.steps||[]);
          delete r.steps;
        });
      }
      if(d.shopping)S.shopping=d.shopping;
    if(d.waitingMenu)S.waitingMenu=d.waitingMenu;
    if(d.mealPlans)S.mealPlans=d.mealPlans;
      if(d.cfg)Object.assign(CFG,d.cfg);
      S.nid=Math.max(20,...S.inventory.map(x=>x.id||0))+1;
      S.nrid=Math.max(10,...S.recipes.map(x=>x.id||0))+1;
      S.recCats.forEach((_,i)=>folderOpen[i]=false);
      S.invCats.forEach((_,i)=>invFolderOpen[i]=true);
      applyTheme();renderInv();renderRec();renderShop();renderMenu();updateBadge();
      toast('クラウドからデータを読み込みました');
    } else {
      toast('初回ログイン：データを保存します');
      if(window._fbSave)window._fbSave();
    }
  }).catch(e=>console.warn('Firestore read error:',e));
  window._fbSave=function(){
    if(!window._fbUid)return;
    const ref=_db.collection('users').doc(window._fbUid).collection('data').doc('main');
    ref.set({
      invCats:S.invCats,recCats:S.recCats,
      inventory:S.inventory,recipes:S.recipes,
      shopping:S.shopping,cfg:CFG
    }).catch(e=>console.warn('Firestore write error:',e));
  };
}

function _fbInit(){
  // ログインUIをトップバーに追加
  const loginBtn=document.createElement('button');
  loginBtn.className='ib';
  loginBtn.id='login-btn';
  loginBtn.title='Googleでログイン';
  loginBtn.innerHTML='<i class="bi bi-person-circle"></i>';
  loginBtn.onclick=()=>{
    const user=_auth.currentUser;
    if(user&&!user.isAnonymous){
      if(confirm('ログアウトしますか？'))_auth.signOut();
    } else {
      const provider=new firebase.auth.GoogleAuthProvider();
      _auth.signInWithPopup(provider)
        .then(result=>{console.log('Popup login OK:', result.user.email);})
        .catch(e=>console.warn('Login error:',e));
    }
  };
  document.querySelector('.topbar').appendChild(loginBtn);

  // リダイレクトログイン後の結果処理
  _auth.getRedirectResult().then(result=>{
    if(result&&result.user)console.log('Redirect login OK:', result.user.email);
  }).catch(e=>console.warn('Redirect result error:',e));

  _auth.onAuthStateChanged(user=>{
    const btn=document.getElementById('login-btn');
    if(!user){
      if(btn)btn.innerHTML='<i class="bi bi-person-circle"></i>';
      return;
    }
    if(user.isAnonymous){
      if(btn)btn.innerHTML='<i class="bi bi-person-circle"></i>';
      return;
    }
    // Googleログイン済み
    if(btn){
      btn.innerHTML=user.photoURL
        ?`<img src="${user.photoURL}" style="width:22px;height:22px;border-radius:50%;object-fit:cover">`
        :`<i class="bi bi-person-check"></i>`;
      btn.title=user.displayName||'ログイン中';
    }
    _loadFromFirestore(user);
  });
}
// DOMContentLoaded後に呼び出す（body末尾のscriptから呼ばれる）
window._fbInitReady=true;
</script>

.menu-plan-body{padding:10px 12px}
.menu-plan-chevron{font-size:15px;color:#aaa;transition:transform .2s;flex-shrink:0}
.menu-plan-chevron.open{transform:rotate(90deg)}
.steps-compact{font-size:12px;color:#555;line-height:1.7}
.steps-compact .step{display:flex;gap:6px;margin-bottom:3px}
.sbox-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
.sbox-toggle h5{margin-bottom:0;pointer-events:none}
.sbox-toggle i{font-size:13px;color:#bbb;transition:transform .2s;flex-shrink:0}
.sbox-toggle i.open{transform:rotate(90deg)}
.sbox-body{margin-top:6px}
.step-group-edit{background:#fafafa;border:0.5px solid #e0e0e0;border-radius:9px;padding:8px 10px;margin-bottom:5px}
.step-group-label-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.step-group-label-row input{flex:1;height:28px;font-size:12px;padding:0 8px;border:.5px solid #ccc;border-radius:7px;background:#fff;color:#333}
.step-group-block{background:#fff;border:0.5px solid #e8e8e8;border-radius:8px;padding:6px 10px;margin-bottom:6px}
.step-group-block-title{font-size:11px;font-weight:600;color:var(--ac-dark);background:var(--ac-light);padding:2px 8px;border-radius:5px;display:inline-block;margin-bottom:6px}
.step-n{width:18px;height:18px;border-radius:50%;background:var(--ac-mid);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:2px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ac-dark);color:#fff;padding:9px 18px;border-radius:22px;font-size:13px;z-index:300;white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2)}
@media(min-width:500px){.toast{position:absolute}}
</style>
</head>
<body>
<div class="kapp" id="kapp">
<div class="topbar">
  <div class="logo" id="topbar-logo">Pantryno</div>
  <span class="topbar-title" id="topbar-title" style="display:none">在庫管理</span>
  <button class="ib" id="cat-btn" onclick="openCatManage()"><i class="bi bi-folder"></i></button>
  <button class="ib primary" id="add-btn" onclick="handleAdd()"><i class="bi bi-plus-lg"></i></button>
  <button class="ib" onclick="openCfg()"><i class="bi bi-gear"></i></button>
</div>

<div class="screen active" id="screen-inv">
  <div class="sbar-inv">
    <span class="screen-label">在庫</span>
    <input type="text" id="inv-search" placeholder="食材／食品を検索" oninput="renderInv()">
    <select id="inv-cf" onchange="renderInv()"><option value="">すべてのカテゴリ</option></select>
  </div>
  <div class="scroll" id="inv-c"></div>
</div>

<div class="screen" id="screen-rec">
  <div class="lv" id="rec-lv">
    <div class="sbar"><span class="screen-label">レシピ</span><input type="text" id="rec-search" placeholder="レシピを検索..." oninput="renderRec()"></div>
    <div class="rec-sel-bar"><div class="rec-sel-summary"><span id="rec-sel-txt">レシピを選択・献立に追加</span><button class="add-all-btn" id="add-to-wait-btn" disabled onclick="addSelectedToWait()" style="margin-right:4px"><i class="bi bi-list-check"></i><span id="add-wait-label">作るリストへ</span></button><button class="add-all-btn" id="add-all-btn" disabled onclick="addAllMissing()"><i class="bi bi-cart-plus"></i><span id="add-all-label">買い物へ</span></button></div></div>
    <div class="scroll" id="rec-c"></div>
  </div>
  <div class="dv" id="rec-dv">
    <div class="sbar" style="gap:8px"><button class="btn" style="height:30px" onclick="closeDetail()"><i class="bi bi-arrow-left"></i>戻る</button><div style="flex:1"></div><button class="btn s" id="det-edit"><i class="bi bi-pencil"></i>編集</button><button class="btn s d" id="det-del"><i class="bi bi-trash"></i></button></div>
    <div class="scroll" id="rec-dc"></div>
  </div>
</div>

<div class="screen" id="screen-plan">
  <div style="display:flex;align-items:center;gap:6px;padding:6px 12px;background:#fff;border-bottom:0.5px solid #e0e0e0;flex-shrink:0">
    <span class="screen-label">献立</span>
    <span style="flex:1"></span>
    <button class="shop-add-btn" onclick="openPlanSheet(null)"><i class="bi bi-plus-lg"></i>日付を追加</button>
  </div>
  <div class="scroll" id="plan-c"></div>
</div>
<div class="screen" id="screen-dm">
  <div class="lv" id="dm-lv">
    <div class="sbar"><span class="screen-label">糖尿病食</span><input type="text" id="dm-search" placeholder="レシピを検索..." oninput="renderDm()"></div>
    <div class="rec-sel-bar"><div class="rec-sel-summary"><span id="dm-sel-txt">レシピを選択・献立に追加</span><button class="add-all-btn" id="dm-add-to-wait-btn" disabled onclick="addSelectedToWaitDm()" style="margin-right:4px"><i class="bi bi-list-check"></i><span id="dm-add-wait-label">作るリストへ</span></button><button class="add-all-btn" id="dm-add-all-btn" disabled onclick="addAllMissingDm()"><i class="bi bi-cart-plus"></i><span id="dm-add-all-label">買い物へ</span></button></div></div>
    <div class="scroll" id="dm-c"></div>
  </div>
  <div class="dv" id="dm-dv">
    <div class="sbar" style="gap:8px"><button class="btn" style="height:30px" onclick="closeDmDetail()"><i class="bi bi-arrow-left"></i>戻る</button><div style="flex:1"></div><button class="btn s" id="dm-det-edit"><i class="bi bi-pencil"></i>編集</button><button class="btn s d" id="dm-det-del"><i class="bi bi-trash"></i></button></div>
    <div class="scroll" id="dm-dc"></div>
  </div>
</div>
<div class="screen" id="screen-menu">
  <div style="background:var(--ac-light);border-bottom:0.5px solid #e0e0e0;padding:8px 12px;flex-shrink:0;display:flex;align-items:center;gap:8px">
    <span class="screen-label">献立</span>
    <span style="font-size:12px;color:#666;flex:1" id="menu-sel-lbl">レシピを選択してください</span>
  </div>
  <div class="scroll" id="menu-c"></div>
</div>

<div class="screen" id="screen-shop">
  <div class="shop-topbar"><span class="screen-label">買い物</span><span class="shop-count" id="shop-count">リストは空です</span><button class="shop-add-btn" onclick="addManual()"><i class="bi bi-plus-lg"></i>食材を追加</button></div>
  <div id="shop-toolbar" style="display:flex;align-items:center;gap:6px;padding:5px 12px;background:#fff;border-bottom:0.5px solid #e0e0e0;min-height:38px;flex-shrink:0"></div>
  <div class="scroll" id="shop-c"></div>
  <div class="shr"><button class="shr-btn" onclick="shareToLine()" title="LINE"><i class="bi bi-chat-dots"></i></button><button class="shr-btn" onclick="copyList()" title="コピー"><i class="bi bi-clipboard"></i></button></div>
</div>

<div class="screen" id="screen-wait">
  <div class="shop-topbar">
    <span class="screen-label">献立待機</span>
    <span class="shop-count" id="wait-count">リストは空です</span>
    <button class="shop-add-btn" onclick="addWaitManual()"><i class="bi bi-plus-lg"></i>追加</button>
  </div>
  <div id="wait-toolbar" style="display:flex;align-items:center;gap:6px;padding:5px 12px;background:#fff;border-bottom:0.5px solid #e0e0e0;min-height:38px;flex-shrink:0"></div>
  <div class="scroll" id="wait-c"></div>
</div>
<nav class="bottomnav">
  <button class="bnav active" id="bnav-inv" onclick="switchTab('inv')" style="display:none"><i class="bi bi-box-seam"></i><span>在庫</span></button>
  <button class="bnav" id="bnav-rec" onclick="switchTab('rec')"><i class="bi bi-journal-richtext"></i><span>レシピ</span></button>
  <button class="bnav" id="bnav-dm" onclick="switchTab('dm')"><i class="bi bi-heart-pulse"></i><span>糖尿病食</span></button>
  <button class="bnav" id="bnav-wait" onclick="switchTab('wait')"><i class="bi bi-list-check"></i><span>作るリスト</span></button>
  <button class="bnav" id="bnav-shop" onclick="switchTab('shop')"><div class="bdg"><i class="bi bi-cart3"></i><span class="bdg-n" id="shop-bdg">0</span></div><span>買い物</span></button>
</nav>

<div class="mw" id="mw" style="display:none" onclick="closeMW(event)"><div class="sheet" id="sheet" onclick="e=>e.stopPropagation()"></div></div>
<input type="file" id="import-file" accept=".json" style="display:none" onchange="doImport(event)">
</div>

<script>
const PALETTES=[
  {name:'桜ピンク',mid:'#E8A0A0',dark:'#B05050',light:'#FDE8E8'},
  {name:'ペールローズ',mid:'#D4849A',dark:'#8C3D54',light:'#FAE8EE'},
  {name:'コーラル',mid:'#E8997A',dark:'#A0502A',light:'#FDEEE8'},
  {name:'ピーチ',mid:'#E8B87A',dark:'#A06830',light:'#FDF3E3'},
  {name:'バター',mid:'#D4C47A',dark:'#886C20',light:'#FBF8E3'},
  {name:'レモン',mid:'#C8D47A',dark:'#6C8020',light:'#F5F8E3'},
  {name:'ミント',mid:'#8AC8A0',dark:'#2A7850',light:'#E8F8EE'},
  {name:'セージ',mid:'#7AB8A0',dark:'#1A6855',light:'#E3F5EE'},
  {name:'スカイブルー',mid:'#7AB0D4',dark:'#1A5080',light:'#E3F0FA'},
  {name:'ラベンダー',mid:'#9090D4',dark:'#303880',light:'#EBEBFA'},
  {name:'ライラック',mid:'#B08AC8',dark:'#583A78',light:'#F2E8FA'},
  {name:'モーブ',mid:'#C490B8',dark:'#703868',light:'#F8E8F5'},
  {name:'ベビーブルー',mid:'#90B8D4',dark:'#284C6C',light:'#E3EFF8'},
  {name:'ティール',mid:'#70B4B0',dark:'#1A5C58',light:'#E0F3F2'},
  {name:'シャンパン',mid:'#C8B898',dark:'#6C5030',light:'#F8F2E8'},
  {name:'モカ',mid:'#B89878',dark:'#5C3A18',light:'#F5EDE3'},
  {name:'スモーキーローズ',mid:'#C09898',dark:'#604040',light:'#F5EAEA'},
  {name:'ダスティブルー',mid:'#8898B4',dark:'#283858',light:'#E8ECF5'},
  {name:'チャコール',mid:'#6C7070',dark:'#303030',light:'#EBEBEB'},
  {name:'スレート',mid:'#7080A0',dark:'#283050',light:'#E8ECF5'},
  {name:'ダークグレー',mid:'#585858',dark:'#1A1A1A',light:'#EBEBEB'},
  {name:'アッシュ',mid:'#888088',dark:'#382838',light:'#F0ECF0'},
  {name:'ブラック',mid:'#2A2A2A',dark:'#000000',light:'#E8E8E8'},
  {name:'ミッドナイト',mid:'#1A1A2E',dark:'#000010',light:'#E8E8F5'},
  {name:'白（色なし）',mid:'#ffffff',dark:'#cccccc',light:'#f8f8f8',isWhite:true},
];

const STORAGE_KEY='kitchen_app_data';
let CFG={palette:0,fs:13,titleTx:'auto'};
const folderOpen={};
const invFolderOpen={};
const menuOpen={};
let shopSelectMode=false;
const detailOpen={ing:true,step:true};  // 材料・作り方の折りたたみ状態  // 選択削除モード
const shopSelected=new Set();  // 選択中のID  // 献立カードの開閉状態  // 在庫カテゴリの折りたたみ状態

function loadData(){try{const r=localStorage.getItem(STORAGE_KEY);return r?JSON.parse(r):null;}catch{return null;}}
function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY,JSON.stringify({
      invCats:S.invCats,recCats:S.recCats,inventory:S.inventory,
      recipes:S.recipes,shopping:S.shopping,waitingMenu:S.waitingMenu,cfg:CFG
    }));
  }catch(e){console.warn(e);}
  // Firestoreにも保存
  if(window._fbSave)window._fbSave();
}

function applyTheme(){
  const p=PALETTES[CFG.palette];
  const app=document.getElementById('kapp');
  app.style.setProperty('--ac-mid',p.mid);
  app.style.setProperty('--ac-dark',p.dark);
  app.style.setProperty('--ac-light',p.light);
  app.style.setProperty('--bg-page',p.light+'cc');
  let tx;
  if(CFG.titleTx==='white'){tx='#ffffff';}
  else if(CFG.titleTx==='black'){tx='#2a2a2a';}
  else{if(p.isWhite){tx='#2a2a2a';}else{const dark=['#585858','#2A2A2A','#1A1A2E','#6C7070','#7080A0','#888088'];tx=dark.includes(p.mid)?'#ffffff':'#2a2a2a';}}
  app.style.setProperty('--topbar-tx',tx);
  app.style.setProperty('--folder-act-tx', p.isWhite ? '#444' : 'rgba(255,255,255,.85)');
  app.style.setProperty('--fhc-tx', p.isWhite ? '#444' : '#fff');
  app.style.setProperty('--check-bg', p.isWhite ? '#555' : null);
  app.style.setProperty('--logo-tx', p.isWhite ? '#aaa' : '#fff');
  app.style.setProperty('--btn-p-tx', p.isWhite ? '#555' : '#fff');
  app.style.setProperty('--check-tx', p.isWhite ? '#fff' : null);
  applyFontSize(CFG.fs);
}

function applyFontSize(fs){
  const fs2=fs-2;
  const css=`
.kapp .icard-name,.kapp .folder-name,.kapp .rec-row-name,.kapp .ir,.kapp .si,.kapp .btn,.kapp .add-all-btn,.kapp .shop-count,.kapp .cmr,.kapp .cfg-lbl,.kapp .cfg-row,.kapp .rec-sel-summary,.kapp .menu-plan-name,.kapp .em,.kapp .sheet input,.kapp .sheet select,.kapp .sheet textarea,.kapp .ier input,.kapp .ing-group-edit-header input,.kapp .ser textarea{font-size:${fs}px!important}
.kapp .cat-lbl,.kapp .icard-qty,.kapp .icard-exp,.kapp .folder-count,.kapp .miss-badge,.kapp .rec-row-sv,.kapp .shr-lbl,.kapp .cfg-sub,.kapp .ing-group-label,.kapp .menu-plan-sv,.kapp .rec-url-link,.kapp .si-qty,.kapp .sbox h5,.kapp .bnav span,.kapp .sheet label,.kapp .btn.s,.kapp .seg-btn,.kapp .notice,.kapp .steps-compact{font-size:${fs2}px!important}
.kapp .topbar-title,.kapp .sheet h3{font-size:${fs+2}px!important}
.kapp .sbar input,.kapp .sbar-inv input,.kapp .sbar-inv select,.kapp .rec-sel-summary span{font-size:${fs}px!important}`;
  let el=document.getElementById('__kfs__');
  if(!el){el=document.createElement('style');el.id='__kfs__';document.head.appendChild(el);}
  el.textContent=css;
}

function fmtDate(s){if(!s)return'';const[y,m,d]=s.split('-');return`${y}/${m}/${d}`;}
function normalizeStepGroups(raw){
  // すでに新形式
  if(Array.isArray(raw)&&raw.length>0&&typeof raw[0]==='object'&&'steps' in raw[0])return raw;
  // 旧形式(文字列配列) → グループなし1グループに変換
  if(Array.isArray(raw)&&(raw.length===0||typeof raw[0]==='string'))return [{label:'',steps:raw}];
  return [{label:'',steps:[]}];
}
function parseQty(s){if(!s)return{num:null,unit:''};const m=s.match(/^([\d.]+)\s*(.*)$/);if(!m)return{num:null,unit:s.trim()};return{num:parseFloat(m[1]),unit:m[2].trim()};}
function sameUnit(a,b){const n=s=>s.replace(/個|ケ|ヶ/g,'個').replace(/本|束/g,'本').trim();return n(a)===n(b);}

const S={
  invCats:['野菜・果物','肉・魚','乳製品・卵','調味料','缶詰・乾物','冷凍食品','その他'],
  recCats:['和食','洋食','中華','麺類','スープ','デザート','その他'],
  inventory:[],
  recipes:[],
  shopping:[],waitingMenu:[],mealPlans:[],selectedRecs:new Set(),nid:1,nrid:1,tab:'rec',curRec:null
};

(function init(){
  const saved=loadData();
  if(saved){
    if(saved.invCats)S.invCats=saved.invCats;
    if(saved.recCats)S.recCats=saved.recCats;
    if(saved.inventory)S.inventory=saved.inventory;
    if(saved.recipes){
      S.recipes=saved.recipes;
      S.recipes.forEach(r=>{if(r.ings&&!r.ingGroups){r.ingGroups=[{label:'',ings:r.ings}];delete r.ings;}});
    }
    if(saved.shopping)S.shopping=saved.shopping;
    if(saved.waitingMenu)S.waitingMenu=saved.waitingMenu;
    if(saved.mealPlans)S.mealPlans=saved.mealPlans;
    if(saved.cfg)Object.assign(CFG,saved.cfg);
    S.nid=Math.max(20,...S.inventory.map(x=>x.id||0))+1;
    S.nrid=Math.max(10,...S.recipes.map(x=>x.id||0))+1;
  }
  S.recCats.forEach((_,i)=>folderOpen[i]=false);
  S.invCats.forEach((_,i)=>invFolderOpen[i]=true);
})();

function allIngs(r){return r.ingGroups.flatMap(g=>g.ings);}
function calcMissing(){const needed=new Map();S.selectedRecs.forEach(rid=>{const r=S.recipes.find(x=>x.id===rid);if(!r)return;allIngs(r).forEach(ing=>{const key=ing.name.toLowerCase();const{num,unit}=parseQty(ing.qty);if(!needed.has(key))needed.set(key,{name:ing.name,byUnit:new Map()});const e=needed.get(key);let ok=false;for(const[u,n]of e.byUnit){if(sameUnit(u,unit)){e.byUnit.set(u,n+(num||0));ok=true;break;}}if(!ok)e.byUnit.set(unit,num||0);});});const res=[];needed.forEach((e,key)=>{const inv=S.inventory.find(x=>x.name.toLowerCase()===key);const{num:hN,unit:hU}=inv?parseQty(inv.qty):{num:0,unit:''};e.byUnit.forEach((nN,nU)=>{if(!nN||isNaN(nN)){if(!inv)res.push({name:e.name,displayQty:nU||''});return;}let sh;if(hN&&hN>0&&(sameUnit(hU,nU)||!hU)){sh=nN-hN;}else if(!inv){sh=nN;}else{sh=0;}if(sh>0){const d=Number.isInteger(sh)?sh:parseFloat(sh.toFixed(2));res.push({name:e.name,displayQty:`${d}${nU}`});}});});return res;}
function missingCount(r){let c=0;allIngs(r).forEach(ing=>{const key=ing.name.toLowerCase();const inv=S.inventory.find(x=>x.name.toLowerCase()===key);const{num:nN,unit:nU}=parseQty(ing.qty);if(!inv){c++;return;}if(!nN||isNaN(nN))return;const{num:hN,unit:hU}=parseQty(inv.qty);if(hN&&hN>0&&sameUnit(hU,nU)&&nN>hN)c++;});return c;}
function shopNames(){return new Set(S.shopping.map(x=>x.name.toLowerCase()));}
function updateBadge(){const n=S.shopping.filter(x=>!x.checked).length;const b=document.getElementById('shop-bdg');b.style.display=n?'block':'none';b.textContent=n;}
function updateShopCount(){const n=S.shopping.filter(x=>!x.checked).length;const el=document.getElementById('shop-count');if(el)el.textContent=n>0?`未購入 ${n}品`:'リストは空です';}

function switchTab(t){
  S.tab=t;
  ['inv','rec','shop','wait','dm'].forEach(x=>{
    const s=document.getElementById('screen-'+x);if(s)s.classList.toggle('active',x===t);
    const b=document.getElementById('bnav-'+x);if(b)b.classList.toggle('active',x===t);
  });
  const titles={inv:'在庫管理',rec:'レシピ',shop:'買い物リスト',wait:'作るリスト',dm:'糖尿病食レシピ'};
  document.getElementById('topbar-title').textContent=titles[t]||t;

  const showTop=t!=='shop'&&t!=='menu'&&t!=='wait'&&t!=='dm';
  document.getElementById('cat-btn').style.display=showTop?'flex':'none';
  document.getElementById('add-btn').style.display=showTop?'flex':'none';
  if(t==='inv')renderInv();
  if(t==='rec')renderRec();
  if(t==='menu')renderMenu();
  if(t==='shop')renderShop();
  if(t==='wait')renderWait();
  if(t==='dm'){renderDm();}
}
function handleAdd(){S.tab==='inv'?openItemSheet():openRecSheet();}
function openCatManage(){catManageSheet(S.tab==='inv'?'inv':'rec');}

function toggleInvFolder(ci){invFolderOpen[ci]=!invFolderOpen[ci];renderInv();}
function renderInv(){
  const q=document.getElementById('inv-search').value.toLowerCase();
  const cf=document.getElementById('inv-cf').value;
  const sel=document.getElementById('inv-cf');const pv=sel.value;
  sel.innerHTML='<option value="">すべてのカテゴリ</option>';
  S.invCats.forEach((c,i)=>sel.innerHTML+=`<option value="${i}">${c}</option>`);
  sel.value=pv;
  let html='';
  // ★よく使う セクション
  const favItems=S.inventory.filter(it=>it.fav&&it.name.toLowerCase().includes(q)&&(cf===''||parseInt(cf)===it.ci));
  if(favItems.length){
    const isOpen=invFolderOpen['fav']!==false;
    html+=`<div class="fav-section"><div class="fav-section-header fhc" onclick="toggleInvFavFolder()">
      <span style="font-size:16px">⭐</span>
      <span class="fav-section-title">よく使う</span>
      <span class="fav-count">${favItems.length}品</span>
      <i class="bi bi-chevron-right inv-folder-chevron ${isOpen?'open':''}"></i>
    </div>`;
    if(isOpen){
      html+=`<div style="padding:6px 10px 8px"><div class="inv-grid">`;
      favItems.forEach(it=>{html+=icardHtml(it);});
      html+=`</div></div>`;
    }
    html+=`</div>`;
  }
  // カテゴリフォルダ
  let any=false;
  S.invCats.forEach((cat,ci)=>{
    if(cf!==''&&parseInt(cf)!==ci)return;
    const items=S.inventory.filter(it=>it.ci===ci&&it.name.toLowerCase().includes(q));
    if(!items.length)return;
    any=true;
    const isOpen=invFolderOpen[ci]!==false;
    html+=`<div class="inv-folder"><div class="inv-folder-header fhc" onclick="toggleInvFolder(${ci})">
      <i class="bi bi-${isOpen?'folder2-open':'folder2'}" style="font-size:16px;color:var(--ac-mid)"></i>
      <span class="inv-folder-name">${cat}</span>

function calcMissingFrom(selSet){
  const needed=new Map();
  selSet.forEach(rid=>{const r=S.recipes.find(x=>x.id===rid);if(!r)return;allIngs(r).forEach(ing=>{const key=ing.name.toLowerCase();const{num,unit}=parseQty(ing.qty);if(!needed.has(key))needed.set(key,{name:ing.name,byUnit:new Map()});const e=needed.get(key);let ok=false;for(const[u,n]of e.byUnit){if(sameUnit(u,unit)){e.byUnit.set(u,n+(num||0));ok=true;break;}}if(!ok)e.byUnit.set(unit,num||0);});});
  const res=[];needed.forEach((e,key)=>{const inv=S.inventory.find(x=>x.name.toLowerCase()===key);const{num:hN,unit:hU}=inv?parseQty(inv.qty):{num:0,unit:''};e.byUnit.forEach((nN,nU)=>{if(!nN||isNaN(nN)){if(!inv)res.push({name:e.name,displayQty:nU||''});return;}let sh;if(hN&&hN>0&&(sameUnit(hU,nU)||!hU)){sh=nN-hN;}else if(!inv){sh=nN;}else{sh=0;}if(sh>0){const d=Number.isInteger(sh)?sh:parseFloat(sh.toFixed(2));res.push({name:e.name,displayQty:`${d}${nU}`});}});});
  return res;
}

function renderStepGroups(r){

    });
    if(hasLabel)html+=`</div></div>`;
  });
  return html;
}
function renderIngGroups(r,inv){
  let html='';
  r.ingGroups.forEach(grp=>{
    const hasLabel=grp.label&&grp.label.trim();
    if(hasLabel)html+=`<div class="ing-group"><div class="ing-group-label">${grp.label}</div><div class="ing-group-rows">`;
    grp.ings.forEach(ing=>{
      const key=ing.name.toLowerCase();const invItem=inv?inv.find(x=>x.name.toLowerCase()===key):null;
      const{num:nN,unit:nU}=parseQty(ing.qty);let sh=false;
      if(inv){if(!invItem){sh=true;}else if(nN&&!isNaN(nN)){const{num:hN,unit:hU}=parseQty(invItem.qty);if(hN&&sameUnit(hU,nU)&&nN>hN)sh=true;}}
      html+=`<div class="ir${sh?' miss':''}"><span>${ing.name}${sh?'<i class="bi bi-exclamation-triangle" style="font-size:11px;margin-left:3px"></i>':''}</span><span>${ing.qty}</span></div>`;
    });
    if(hasLabel)html+=`</div></div>`;
  });
  return html;
}

function ingGroupsToText(ingGroups){
  // ingGroups → テキスト（グループラベル付き）
  return (ingGroups||[]).map(grp=>{
    const lines=(grp.ings||[]).map(ing=>ing.qty?`${ing.name} ${ing.qty}`:ing.name).join('\n');
    return grp.label?`【${grp.label}】\n${lines}`:lines;
  }).join('\n');
}
function stepGroupsToText(stepGroups){
  // stepGroups → テキスト（グループラベル付き）
  return (stepGroups||[]).map(grp=>{
    const lines=(grp.steps||[]).join('\n');
    return grp.label?`【${grp.label}】\n${lines}`:lines;
  }).join('\n');
}
function textToIngGroups(text){
  // テキスト → ingGroups形式に変換
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const groups=[];
  let current={label:'',ings:[]};
  lines.forEach(line=>{
    if(line.startsWith('【')&&line.endsWith('】')){
      if(current.ings.length)groups.push(current);
      current={label:line.slice(1,-1),ings:[]};
    } else {
      // 最後のスペースで名前と分量に分割
      const sp=line.lastIndexOf(' ');
      if(sp>0){
        current.ings.push({name:line.slice(0,sp).trim(),qty:line.slice(sp+1).trim()});
      } else {
        current.ings.push({name:line,qty:''});
      }
    }
  });
  if(current.ings.length)groups.push(current);
  return groups.length?groups:[{label:'',ings:[]}];
}
function textToStepGroups(text){
  // テキスト → stepGroups形式に変換
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const groups=[];
  let current={label:'',steps:[]};
  lines.forEach(line=>{
    if(line.startsWith('【')&&line.endsWith('】')){
      if(current.steps.length)groups.push(current);
      current={label:line.slice(1,-1),steps:[]};
    } else {
      current.steps.push(line);
    }
  });
  if(current.steps.length)groups.push(current);
  return groups.length?groups:[{label:'',steps:[]}];
}

function saveRec(id){
  const name=document.getElementById('rn').value.trim();if(!name)return alert('レシピ名を入力してください');
  const ci=parseInt(document.getElementById('rci').value);
  const sv=document.getElementById('rsv').value.trim();
  const url=document.getElementById('rurl').value.trim();
  const ingGroups=[];
  document.querySelectorAll('[id^="rg_ing_"]').forEach(el=>{
    const gi=el.id.replace('rg_ing_','');
    if(isNaN(gi))return;
    const label=(document.getElementById('rg_ing_lbl_'+gi)||{}).value||'';
    const txt=(document.getElementById('rg_ing_txt_'+gi)||{}).value||'';
    const ings=txt.split('\n').map(l=>l.trim()).filter(l=>l).map(line=>{
      const sp=line.lastIndexOf(' ');
      return sp>0?{name:line.slice(0,sp).trim(),qty:line.slice(sp+1).trim()}:{name:line,qty:''};
    });
    if(ings.length)ingGroups.push({label:label.trim(),ings});
  });
  if(!ingGroups.length)ingGroups.push({label:'',ings:[]});
  const stepGroups=[];
  document.querySelectorAll('[id^="rg_step_"]').forEach(el=>{
    const gi=el.id.replace('rg_step_','');
    if(isNaN(gi))return;
    const label=(document.getElementById('rg_step_lbl_'+gi)||{}).value||'';
    const txt=(document.getElementById('rg_step_txt_'+gi)||{}).value||'';
    const steps=txt.split('\n').map(l=>l.trim()).filter(l=>l);
    if(steps.length)stepGroups.push({label:label.trim(),steps});
  });
  if(!stepGroups.length)stepGroups.push({label:'',steps:[]});
  const rtype=document.getElementById('rtype-dm')&&document.getElementById('rtype-dm').classList.contains('on')?'dm':'normal';
  if(id){const r=S.recipes.find(x=>x.id===id);Object.assign(r,{name,ci,sv,url,ingGroups,stepGroups,rtype});delete r.steps;}
  else{S.recipes.push({id:S.nrid++,name,ci,sv,url,ingGroups,stepGroups,rtype});folderOpen[ci]=true;}
  closeSheet();
  if(S.curRec===id&&id)openDetail(id);else closeDetail();
  saveData();
}

let planNid=1;
const planOpen={};

function fmtPlanDate(d){
  if(!d)return'';
  const dt=new Date(d+'T00:00:00');
  const w=['日','月','火','水','木','金','土'][dt.getDay()];
  return`${d.slice(5).replace('-','/')}（${w}）`;
}

function renderPlan(){
  const plans=[...S.mealPlans].sort((a,b)=>a.date<b.date?-1:1);
  if(!plans.length){
    document.getElementById('plan-c').innerHTML=`<div class="em"><i class="bi bi-calendar3"></i>献立がありません<br><button class="btn p" style="margin-top:12px" onclick="openPlanSheet(null)">日付を追加</button></div>`;
    return;
  }
  let h='<div style="padding-bottom:8px">';
  plans.forEach(plan=>{
    const isOpen=planOpen[plan.id]!==false;
    const preview=plan.content?(plan.content.split('\n').slice(0,2).join('　')):'';
    h+=`<div style="background:#fff;border:.5px solid #e0e0e0;border-radius:10px;margin-bottom:6px;overflow:hidden">
      <div class="folder-header fhc" onclick="togglePlanCard('${plan.id}')" style="padding:8px 12px">
        <i class="bi bi-calendar3 folder-icon" style="font-size:15px"></i>
        <span class="folder-name" style="font-size:13px">${fmtPlanDate(plan.date)}</span>
        ${!isOpen&&preview?`<span style="font-size:11px;color:rgba(255,255,255,.75);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;min-width:0;margin-left:4px">${preview}</span>`:'<span style="flex:1"></span>'}
        <div style="display:flex;gap:2px;flex-shrink:0" onclick="event.stopPropagation()">
          <button class="icb" onclick="openPlanSheet('${plan.id}')"><i class="bi bi-pencil"></i></button>
          <button class="icb del" onclick="deletePlan('${plan.id}')"><i class="bi bi-trash"></i></button>
        </div>
        <i class="bi bi-chevron-right folder-chevron ${isOpen?'open':''}" style="font-size:13px"></i>
      </div>
      ${isOpen?`<div style="padding:8px 12px;border-top:.5px solid #e8e8e8">
        <div style="font-size:12px;color:#444;white-space:pre-wrap;line-height:1.8">${plan.content||'（未入力）'}</div>
      </div>`:''}
    </div>`;
  });
  h+='</div>';
  document.getElementById('plan-c').innerHTML=h;
}

function togglePlanCard(id){
  planOpen[id]=planOpen[id]===false?true:false;
  renderPlan();
}

function openPlanSheet(planId){
  const plan=planId?S.mealPlans.find(x=>x.id===planId):null;
  showSheet(`<h3>${plan?'献立を編集':'献立を追加'}</h3>
    <div><label>日付</label><input type="date" id="plan-date" value="${plan?plan.date:new Date().toISOString().slice(0,10)}"></div>
    <div><label>献立（朝昼晩・間食などまとめて自由に入力）</label>
    <textarea id="plan-content" style="width:100%;min-height:140px;font-size:13px;line-height:1.9;padding:8px 10px;border:.5px solid #ccc;border-radius:9px;background:#fafafa;color:#333;resize:vertical" placeholder="例：&#10;朝：トースト、ヨーグルト&#10;昼：親子丼&#10;間食：りんご&#10;夜：肉じゃが、みそ汁、ごはん">${plan?plan.content||'':''}</textarea></div>

function savePlan(planId){
  const date=document.getElementById('plan-date').value;
  if(!date)return alert('日付を入力してください');
  const content=document.getElementById('plan-content').value;
  if(planId){
    const plan=S.mealPlans.find(x=>x.id===planId);
    if(plan)Object.assign(plan,{date,content});
  } else {
    S.mealPlans.push({id:'p'+(planNid++)+Date.now(),date,content});
  }
  closeSheet();renderPlan();saveData();
}
function deletePlan(planId){
  if(!confirm('この献立を削除しますか？'))return;
  S.mealPlans=S.mealPlans.filter(x=>x.id!==planId);
  renderPlan();saveData();
}

function toggleWaitDetail(id){waitOpen[id]=!waitOpen[id];renderWait();}
function waitItemHtml(it){
  const r=it.recipeId?S.recipes.find(x=>x.id===it.recipeId):null;
  const isOpen=waitOpen[it.id];
  if(r){
    // レシピ登録済み→折りたたみあり
    const ingHtml=renderIngGroups(r,S.inventory);
    const stepHtml=renderStepGroups(r);
    return`<div style="background:#fff;border:.5px solid #e0e0e0;border-radius:10px;margin-bottom:6px;overflow:hidden ${it.checked?';opacity:.5':''}">
      <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--ac-light)">
        <input type="checkbox" ${it.checked?'checked':''} onchange="toggleWait('${it.id}')" style="width:18px;height:18px;accent-color:var(--ac-mid);flex-shrink:0;cursor:pointer">
        <span style="flex:1;font-size:13px;font-weight:500;color:#333;${it.checked?'text-decoration:line-through':''}">${it.name}</span>
        <button class="icb" onclick="toggleWaitDetail('${it.id}')" style="color:var(--ac-mid)"><i class="bi bi-chevron-${isOpen?'up':'down'}"></i></button>
        <button class="icb del" onclick="rmWait('${it.id}')"><i class="bi bi-x-lg"></i></button>
      </div>
      ${isOpen?`<div style="padding:8px 12px;border-top:.5px solid #e8e8e8">
        <div class="sbox" style="margin-bottom:6px"><h5>材料</h5>${ingHtml}</div>
        <div class="sbox"><h5>作り方</h5>${stepHtml}</div>
      </div>`:''}
    </div>`;
  } else {
    // 手打ち→シンプル表示（薄いボーダー・イタリックで区別）
    return`<div class="si ${it.checked?'chk':''}" style="border-style:dashed;border-color:#ccc">
      <input type="checkbox" ${it.checked?'checked':''} onchange="toggleWait('${it.id}')">
      <i class="bi bi-pencil" style="font-size:11px;color:#bbb;flex-shrink:0"></i>
      <span class="si-name" style="flex:1;font-style:italic;color:#888">${it.name}</span>
      <button class="icb del" onclick="rmWait('${it.id}')"><i class="bi bi-x-lg"></i></button>
    </div>`;
  }
}
function getListText(){const items=S.shopping.filter(x=>!x.checked);return items.length?'🛒 買い物リスト\n'+items.map(x=>`・${x.name}${x.qty?' ('+x.qty+')':''}`).join('\n'):null;}
function shareToLine(){const t=getListText();if(!t)return alert('買い物リストが空です');window.open('https://line.me/R/msg/text/?'+encodeURIComponent(t),'_blank','noopener');}
function addToReminders(){if(!S.shopping.filter(x=>!x.checked).length)return alert('買い物リストが空です');showSheet(`<h3>リマインダーに追加</h3><div class="notice">ブラウザの制限により直接追加はできません。</div><ol style="font-size:13px;line-height:2.2;padding-left:18px"><li>「コピーして閉じる」でリストをコピー</li><li>リマインダーアプリを開く</li><li>Siriに伝えるか手動でペースト</li></ol><div class="sf"><button class="btn" onclick="closeSheet()">閉じる</button><button class="btn p" onclick="copyList();closeSheet()"><i class="bi bi-clipboard"></i>コピーして閉じる</button></div>`);}
function copyList(){const t=getListText();if(!t)return alert('リストが空です');navigator.clipboard.writeText(t).then(()=>toast('コピーしました！')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('コピーしました！');});}

function toast(msg){const ex=document.querySelector('.toast');if(ex)ex.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.getElementById('kapp').appendChild(t);setTimeout(()=>t.remove(),2500);}
function showSheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('mw').style.display='flex';}
function closeSheet(){document.getElementById('mw').style.display='none';}
function closeMW(e){if(e.target===document.getElementById('mw'))closeSheet();}

applyTheme();renderRec();renderShop();updateBadge();switchTab('rec');
</script>
